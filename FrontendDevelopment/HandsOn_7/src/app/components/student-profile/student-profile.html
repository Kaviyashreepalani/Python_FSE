<div class="profile-container">

<h1>

Student Profile

</h1>

<form

[formGroup]="profileForm"

(ngSubmit)="submit()"

>

<label>

Name

</label>

<input

type="text"

formControlName="name"

>

<div

class="error"

*ngIf="profileForm.controls.name.touched && profileForm.controls.name.invalid"

>

Name is required

</div>

<label>

Email

</label>

<input

type="email"

formControlName="email"

>

<div

class="error"

*ngIf="profileForm.controls.email.touched && profileForm.controls.email.invalid"

>

Enter a valid email

</div>

<label>

Semester

</label>

<input

type="number"

formControlName="semester"

>

<div

class="error"

*ngIf="profileForm.controls.semester.touched && profileForm.controls.semester.invalid"

>

Semester must be between 1 and 8

</div>

<button

type="submit"

[disabled]="profileForm.invalid"

>

Save Profile

</button>

</form>

</div>
