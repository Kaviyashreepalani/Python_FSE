<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>

    <div class="logo">
        Student Portal
    </div>

    <nav>

        <ul>

            <li><a href="#">Home</a></li>
            <li><a href="#">Courses</a></li>
            <li><a href="#">Profile</a></li>
            <li><a href="#">Grades</a></li>

        </ul>

    </nav>

</header>

<section id="hero">

    <h1>Welcome to the Student Portal</h1>

    <p>Manage your courses and grades easily.</p>

</section>

<section class="controls">

    <input
        type="text"
        id="search-courses"
        placeholder="Search courses (e.g. React, Java)..."
    >

</section>

<section id="courses">

    <h2>Available Courses</h2>

    <div class="course-grid"></div>

    <p id="total-credits"></p>

    <div id="selected-course"></div>

</section>

<script src="app.js"></script>

</body>

</html>
